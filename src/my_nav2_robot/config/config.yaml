# ESKF 初始参数配置
eskf:
  # 状态误差协方差初始值 (15×15 对角线标量)
  P_init: 0.01

  # 过程噪声 (15×15 对角线标量)
  # 值越小 → 越信任 IMU 预测，里程计更平滑
  # 值越大 → 越信任观测更新，响应更快但可能更抖
  Q_init: 0.005

  # 轮速观测噪声 (4×4 对角线标量)
  # 值越大 → 越不信任轮速观测，轮速打滑时增大可减弱干扰
  R_init: 0.005

  # 零倾斜观测噪声 (2×2 对角线标量)
  # 值越小 → 越强地约束 pitch/roll=0，防止 z 轴漂移
  R_tilt_init: 0.005
