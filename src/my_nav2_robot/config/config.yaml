# ESKF 初始参数配置
data_handle_node:
  ros__parameters:
    # 零偏标定时长（秒）：上电后车辆静止期间累积 IMU 数据的时长
    # 范围 1.0~3.0s，期间车辆必须保持静止
    eskf.calibration_duration: 1.5

    # 状态误差协方差初始值 (18×18 对角线标量)
    eskf.P_init: 0.01

    # 过程噪声 (18×18 对角线标量)
    # 值越小 → 越信任 IMU 预测，里程计更平滑
    # 值越大 → 越信任观测更新，响应更快但可能更抖
    eskf.Q_init: 0.005

    # 轮速观测噪声 (4×4 对角线标量)
    # 值越大 → 越不信任轮速观测，轮速打滑时增大可减弱干扰
    eskf.R_init: 0.005

    # 零倾斜观测噪声 (2×2 对角线标量)
    # 值越小 → 越强地约束 pitch/roll=0，防止 z 轴漂移
    eskf.R_tilt_init: 0.005

    # 低通滤波平滑系数  y[n] = alpha * x[n] + (1-alpha) * y[n-1]
    # 值越小 -> 滤波越强，越平滑，滞后越大；值越大 -> 越贴近原始数据
    eskf.alpha_lowpass: 0.05        # 加速度计 + 轮速（重滤波，压制噪声）
    eskf.alpha_lowpass_gyro: 0.3    # 陀螺仪（轻滤波，保留动态响应）